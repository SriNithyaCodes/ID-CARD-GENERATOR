<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Aurora University</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #C8102E;
            --primary-dark: #8b0a1e;
            --accent: #000080;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .mesh-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(circle at 0% 0%, rgba(200, 16, 46, 0.1) 0%, transparent 35%),
                radial-gradient(at 50% 50%, #0f172a 0%, #020617 100%);
        }

        /* Sidebar Navigation */
        aside {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1.5rem;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3.5rem;
            padding-left: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            box-shadow: 0 8px 16px rgba(200, 16, 46, 0.2);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.25rem;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            border: 1px solid var(--glass-border);
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.1), transparent);
            color: white;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .logout-btn {
            margin-top: auto;
            padding: 1rem;
            background: rgba(200, 16, 46, 0.1);
            color: var(--primary);
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            border: 1px solid rgba(200, 16, 46, 0.2);
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            flex: 1;
            z-index: 10;
            padding: 3rem 4rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
        }

        .header-info h2 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header-info p {
            color: var(--text-dim);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1rem 2rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 20px rgba(200, 16, 46, 0.2);
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(200, 16, 46, 0.3);
            filter: brightness(1.1);
        }

        /* Data Table */
        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.25rem 2rem;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1.5rem 2rem;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .roll-chip {
            background: rgba(0, 0, 128, 0.3);
            color: #94bcff;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(0, 0, 128, 0.2);
        }

        .action-cell {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
        }

        .action-btn.preview:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .action-btn.delete:hover {
            background: #4b5563;
        }
    </style>
</head>

<body onload="checkLogin()">
    <div class="mesh-background"></div>

    <aside>
        <div class="logo-box">
            <div class="logo-icon">AU</div>
            <span class="logo-text">Aurora</span>
        </div>

        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <span>🏠</span> Dashboard Hub
            </a>
            <a href="student-dashboard.html" class="nav-item active">
                <span>🎓</span> Student Portal
            </a>
            <a href="faculty-dashboard.html" class="nav-item">
                <span>👔</span> Faculty Portal
            </a>
        </nav>

        <a href="javascript:void(0)" onclick="logout()" class="logout-btn">Terminate Session</a>
    </aside>

    <main>
        <header>
            <div class="header-info">
                <h2>Student Registry</h2>
                <p>Manage digital identity credentials for the student body.</p>
            </div>
            <a href="add-student.html" class="add-btn">
                <span>+</span> New Registration
            </a>
        </header>

        <section class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Identity ID</th>
                        <th>Full Name</th>
                        <th>Account Identifier</th>
                        <th>Program</th>
                        <th>Academic Batch</th>
                        <th>Operations</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated via API -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        function checkLogin() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            } else {
                fetchStudents();
            }
        }

        async function fetchStudents() {
            try {
                const response = await fetch('/api/students');
                const students = await response.json();
                const tbody = document.querySelector('#studentTable tbody');
                tbody.innerHTML = '';

                students.forEach(s => {
                    const row = `<tr>
                        <td style="color: #64748b; font-weight: 600;">#${s.id}</td>
                        <td style="font-weight: 600;">${s.fullName}</td>
                        <td><span class="roll-chip">${s.rollNumber}</span></td>
                        <td>${s.course}</td>
                        <td>Class of ${s.academicYear}</td>
                        <td>
                            <div class="action-cell">
                                <a href="preview.html?id=${s.id}" class="action-btn preview" title="Preview ID Card">👁️</a>
                                <button onclick="deleteStudent(${s.id})" class="action-btn delete" title="Revoke Identity">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching students:', error);
            }
        }

        async function deleteStudent(id) {
            if (confirm('Are you sure you want to revoke this student identification?')) {
                await fetch(`/api/students/${id}`, { method: 'DELETE' });
                fetchStudents();
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
