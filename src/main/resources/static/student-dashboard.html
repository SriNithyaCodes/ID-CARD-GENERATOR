<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Aurora University</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Portal | Aurora University</title>
        <!-- Premium Poppins Font -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
        <style>
            :root {
                --primary: #C8102E;
                --primary-dark: #8b0a1e;
                --secondary: #000080;
                --bg-light: #f8fafc;
                --sidebar-bg: rgba(255, 255, 255, 0.9);
                --text-main: #0f172a;
                --text-dim: #475569;
                --glass-border: rgba(15, 23, 42, 0.08);
                --card-bg: #ffffff;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body {
                background-color: var(--bg-light);
                min-height: 100vh;
                display: flex;
                overflow-x: hidden;
                position: relative;
            }

            /* Light Aurora Mesh Background */
            .mesh-background {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                background:
                    radial-gradient(circle at 10% 10%, rgba(200, 16, 46, 0.03) 0%, transparent 40%),
                    linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            }

            /* Sidebar Navigation */
            aside {
                width: 300px;
                background: var(--sidebar-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-right: 1px solid var(--glass-border);
                z-index: 100;
                display: flex;
                flex-direction: column;
                padding: 3rem 2rem;
                box-shadow: 10px 0 40px rgba(15, 23, 42, 0.02);
            }

            .logo-box {
                display: flex;
                align-items: center;
                gap: 1.25rem;
                margin-bottom: 4rem;
            }

            .logo-icon {
                width: 45px;
                height: auto;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .logo-icon img {
                width: 100%;
                height: auto;
                filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.05));
            }

            .logo-text {
                color: var(--text-main);
                font-size: 1.4rem;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .nav-menu {
                flex: 1;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 1.25rem;
                padding: 1.1rem 1.5rem;
                color: var(--text-dim);
                text-decoration: none;
                border-radius: 18px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                margin-bottom: 0.75rem;
                font-weight: 600;
                font-size: 0.95rem;
            }

            .nav-item:hover {
                color: var(--primary);
                background: rgba(200, 16, 46, 0.05);
                transform: translateX(5px);
            }

            .nav-item.active {
                background: var(--primary);
                color: white;
                box-shadow: 0 10px 20px rgba(200, 16, 46, 0.2);
            }

            .logout-btn {
                margin-top: auto;
                padding: 1.1rem;
                background: #fff;
                color: var(--text-dim);
                text-align: center;
                border-radius: 18px;
                text-decoration: none;
                font-weight: 700;
                transition: all 0.3s;
                border: 1px solid var(--glass-border);
                font-size: 0.9rem;
            }

            .logout-btn:hover {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
                box-shadow: 0 10px 20px rgba(200, 16, 46, 0.15);
            }

            /* Main Content */
            main {
                flex: 1;
                z-index: 10;
                padding: 4rem 5%;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                margin-bottom: 3.5rem;
            }

            .header-info h2 {
                color: var(--text-main);
                font-size: 2.5rem;
                font-weight: 800;
                letter-spacing: -0.02em;
                margin-bottom: 0.5rem;
            }

            .header-info p {
                color: var(--text-dim);
                font-size: 1.1rem;
                font-weight: 500;
            }

            .add-btn {
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                color: white;
                padding: 1rem 2.2rem;
                border-radius: 18px;
                text-decoration: none;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                box-shadow: 0 15px 30px rgba(200, 16, 46, 0.3);
                transition: all 0.4s;
                font-size: 0.95rem;
            }

            .add-btn:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 40px rgba(200, 16, 46, 0.4);
                filter: brightness(1.1);
            }

            /* Data Table */
            .table-container {
                background: white;
                border: 1px solid var(--glass-border);
                border-radius: 32px;
                overflow: hidden;
                box-shadow: 0 20px 50px rgba(15, 23, 42, 0.04);
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
            }

            th {
                background: #f8fafc;
                padding: 1.5rem 2rem;
                color: var(--text-dim);
                font-weight: 700;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                border-bottom: 1px solid var(--glass-border);
            }

            td {
                padding: 1.5rem 2rem;
                color: var(--text-main);
                border-bottom: 1px solid #f1f5f9;
                font-size: 1rem;
                font-weight: 500;
            }

            tr:last-child td {
                border-bottom: none;
            }

            tr:hover td {
                background: #fdfdfd;
            }

            .roll-chip {
                background: rgba(0, 0, 128, 0.05);
                color: var(--secondary);
                padding: 0.5rem 1rem;
                border-radius: 12px;
                font-size: 0.85rem;
                font-weight: 700;
                border: 1px solid rgba(0, 0, 128, 0.05);
            }

            .action-cell {
                display: flex;
                gap: 1rem;
            }

            .action-btn {
                width: 40px;
                height: 40px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                transition: all 0.3s;
                border: 1px solid var(--glass-border);
                background: #f8fafc;
                color: var(--text-main);
                cursor: pointer;
                font-size: 1.1rem;
            }

            .action-btn.preview:hover {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
                transform: scale(1.1);
            }

            .action-btn.delete:hover {
                background: #fee2e2;
                color: #ef4444;
                border-color: #fecaca;
                transform: scale(1.1);
            }
        </style>
    </head>

<body onload="checkLogin()">
    <div class="mesh-background"></div>

    <aside>
        <div class="logo-box">
            <div class="logo-icon">
                <img src="images/aurora.png" alt="Aurora Logo">
            </div>
            <span class="logo-text">Aurora</span>
        </div>

        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <span>🏠</span> Dashboard Hub
            </a>
            <a href="student-dashboard.html" class="nav-item active">
                <span>🎓</span> Student Portal
            </a>
            <a href="faculty-dashboard.html" class="nav-item">
                <span>👔</span> Faculty Portal
            </a>
        </nav>

        <a href="javascript:void(0)" onclick="logout()" class="logout-btn">Terminate Session</a>
    </aside>

    <main>
        <header>
            <div class="header-info">
                <h2>Student Registry</h2>
                <p>Manage digital identity credentials for the student body.</p>
            </div>
            <a href="add-student.html" class="add-btn">
                <span>+</span> New Registration
            </a>
        </header>

        <section class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Identity ID</th>
                        <th>Full Name</th>
                        <th>Account Identifier</th>
                        <th>Program</th>
                        <th>Academic Batch</th>
                        <th>Operations</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated via API -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        function checkLogin() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            } else {
                fetchStudents();
            }
        }

        async function fetchStudents() {
            try {
                const response = await fetch('/api/students');
                const students = await response.json();
                const tbody = document.querySelector('#studentTable tbody');
                tbody.innerHTML = '';

                students.forEach(s => {
                    const row = `<tr>
                        <td style="color: #64748b; font-weight: 600;">#${s.id}</td>
                        <td style="font-weight: 600;">${s.fullName}</td>
                        <td><span class="roll-chip">${s.rollNumber}</span></td>
                        <td>${s.course}</td>
                        <td>Class of ${s.academicYear}</td>
                        <td>
                            <div class="action-cell">
                                <a href="preview.html?id=${s.id}" class="action-btn preview" title="Preview ID Card">👁️</a>
                                <button onclick="deleteStudent(${s.id})" class="action-btn delete" title="Revoke Identity">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching students:', error);
            }
        }

        async function deleteStudent(id) {
            if (confirm('Are you sure you want to revoke this student identification?')) {
                await fetch(`/api/students/${id}`, { method: 'DELETE' });
                fetchStudents();
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
