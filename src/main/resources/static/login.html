<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Aurora University</title>
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #C8102E;
            --primary-dark: #8b0a1e;
            --accent: #000080;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Sophisticated Mesh Gradient Background */
        .mesh-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(circle at 0% 0%, rgba(200, 16, 46, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 0, 128, 0.15) 0%, transparent 50%),
                radial-gradient(at 50% 50%, #0f172a 0%, #020617 100%);
        }

        /* Animated Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
            transition: transform 0.2s ease-out;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
        }

        /* Premium Glass Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3.5rem 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(200, 16, 46, 0.3);
            transform: rotate(-5deg);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.9375rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.625rem;
        }

        label {
            color: var(--text-main);
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0.9;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.2);
        }

        input::placeholder {
            color: #475569;
        }

        .login-btn {
            width: 100%;
            padding: 1.125rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            box-shadow: 0 8px 16px rgba(200, 16, 46, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(200, 16, 46, 0.4);
            filter: brightness(1.1);
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            font-size: 0.8125rem;
        }
    </style>
</head>

<body>
    <div class="mesh-background"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        <div class="header">
            <div class="logo-box">AU</div>
            <h1>Portal Access</h1>
            <p>Administrative Control Center</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="label-row">
                    <label>IDENTIFIER</label>
                </div>
                <input type="text" id="username" placeholder="admin" required autofocus>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label>CREDENTIALS</label>
                </div>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                <span class="btn-text">Establish Secure Session</span>
            </button>
        </form>

        <div class="footer-note">
            Aurora University Identity Management System &copy; 2026
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.opacity = '0.7';
            btnText.textContent = 'Authenticating...';

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            setTimeout(() => {
                if (u === 'admin' && p === 'admin123') {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('ACCESS DENIED: Invalid administrative credentials.');
                    submitBtn.style.pointerEvents = 'all';
                    submitBtn.style.opacity = '1';
                    btnText.textContent = 'Establish Secure Session';
                }
            }, 800);
        });

        // Interactive mouse movement for blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            document.querySelector('.blob-1').style.transform = `translate(${x * 60}px, ${y * 60}px)`;
            document.querySelector('.blob-2').style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>
</body>

</html>
