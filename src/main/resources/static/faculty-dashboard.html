<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal | Aurora University</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #C8102E;
            --primary-dark: #8b0a1e;
            --accent: #000080;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .mesh-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(circle at 100% 0%, rgba(0, 0, 128, 0.1) 0%, transparent 35%),
                radial-gradient(at 50% 50%, #0f172a 0%, #020617 100%);
        }

        aside {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1.5rem;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3.5rem;
            padding-left: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.25rem;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            border: 1px solid var(--glass-border);
            background: linear-gradient(135deg, rgba(0, 0, 128, 0.1), transparent);
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            padding: 1rem;
            background: rgba(200, 16, 46, 0.1);
            color: var(--primary);
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            border: 1px solid rgba(200, 16, 46, 0.2);
        }

        main {
            flex: 1;
            z-index: 10;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .coming-soon-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 5rem 3rem;
            max-width: 600px;
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .coming-soon-card h2 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .coming-soon-card p {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-back {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(200, 16, 46, 0.3);
        }
    </style>
</head>

<body onload="checkLogin()">
    <div class="mesh-background"></div>
    <aside>
        <div class="logo-box">
            <div class="logo-icon">AU</div><span class="logo-text">Aurora</span>
        </div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><span>🏠</span> Dashboard Hub</a>
            <a href="student-dashboard.html" class="nav-item"><span>🎓</span> Student Portal</a>
            <a href="faculty-dashboard.html" class="nav-item active"><span>👔</span> Faculty Portal</a>
        </nav>
        <a href="javascript:void(0)" onclick="logout()" class="logout-btn">Terminate Session</a>
    </aside>

    <main>
        <div class="coming-soon-card">
            <div style="font-size: 4rem; margin-bottom: 2rem;">🏗️</div>
            <h2>Faculty Portal</h2>
            <p>Our engineering team is currently developing the faculty identification management layer. This module
                will support advanced credentialing for academic staff and administration.</p>
            <a href="dashboard.html" class="btn-back">Return to Hub</a>
        </div>
    </main>

    <script>
        function checkLogin() { if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; } }
        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>

</html>
