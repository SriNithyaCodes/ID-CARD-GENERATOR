<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Aurora University</title>
    <!-- Premium Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #C8102E;
            --primary-dark: #8b0a1e;
            --secondary: #000080;
            --bg-light: #f8fafc;
            --text-main: #0f172a;
            --text-dim: #475569;
            --glass-border: rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .mesh-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(circle at 0% 0%, rgba(200, 16, 46, 0.05) 0%, transparent 40%),
                linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
        }

        header {
            position: relative;
            z-index: 10;
            padding: 2.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--text-main);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: white;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.85rem 1.75rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back:hover {
            color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(200, 16, 46, 0.08);
        }

        .form-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 95%;
            margin: 2rem auto 5rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            padding: 4.5rem;
            border-radius: 48px;
            box-shadow: 0 40px 100px -20px rgba(15, 23, 42, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Photo Upload Section */
        .photo-upload-zone {
            width: 100%;
            margin-bottom: 3.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .photo-preview-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #f1f5f9;
            border: 3px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.02);
        }

        .photo-preview-circle:hover {
            border-color: var(--primary);
            background: rgba(200, 16, 46, 0.03);
            transform: scale(1.05);
        }

        .photo-preview-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-preview-circle.has-image {
            border-style: solid;
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(200, 16, 46, 0.15);
        }

        .photo-preview-circle span {
            font-size: 2.5rem;
            color: #94a3b8;
        }

        .upload-label {
            background: #f1f5f9;
            color: var(--text-main);
            padding: 0.85rem 1.75rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .upload-label:hover {
            background: var(--text-main);
            color: white;
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 2.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.85rem;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.92rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        input,
        textarea {
            width: 100%;
            padding: 1.25rem 1.75rem;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s;
            font-weight: 600;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 10px 30px rgba(200, 16, 46, 0.08);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        button[type="submit"] {
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(200, 16, 46, 0.25);
            margin-top: 2rem;
            letter-spacing: 0.02em;
        }

        button[type="submit"]:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(200, 16, 46, 0.35);
            filter: brightness(1.1);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .form-container {
                padding: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="mesh-background"></div>
    <header>
        <h1>Student Registration</h1>
        <a href="dashboard.html" class="btn-back"><span>←</span> Hub</a>
    </header>

    <div class="form-container">
        <form id="addStudentForm">
            <!-- Photo Upload Area -->
            <div class="photo-upload-zone">
                <div class="photo-preview-circle" onclick="document.getElementById('photoInput').click()">
                    <span id="uploadIcon">📷</span>
                    <img id="photoPreview" src="" alt="Preview">
                </div>
                <label class="upload-label" for="photoInput">Identify Photograph</label>
                <input type="file" id="photoInput" accept="image/*" style="display: none;">
            </div>

            <div class="form-group">
                <label>Full Legal Name</label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber" required>
                </div>
                <div class="form-group">
                    <label>Course / Program</label>
                    <input type="text" id="course" required>
                </div>
            </div>

            <div class="form-group">
                <label>Academic Duration</label>
                <input type="text" id="academicYear" required>
            </div>

            <div class="form-group">
                <label>Permanent Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" id="bloodGroup" required>
                </div>
                <div class="form-group">
                    <label>Emergency Contact</label>
                    <input type="text" id="emergencyContact" required>
                </div>
            </div>

            <div class="form-group">
                <label>Standardized Issue Date</label>
                <input type="date" id="issueDate" required>
            </div>

            <button type="submit">Complete Registration</button>
        </form>
    </div>

    <script>
        // Photo Preview Logic
        const photoInput = document.getElementById('photoInput');
        const photoPreview = document.getElementById('photoPreview');
        const uploadIcon = document.getElementById('uploadIcon');
        const previewCircle = document.querySelector('.photo-preview-circle');

        photoInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    photoPreview.src = e.target.result;
                    photoPreview.style.display = 'block';
                    uploadIcon.style.display = 'none';
                    previewCircle.classList.add('has-image');
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('addStudentForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData();
            formData.append('fullName', document.getElementById('fullName').value);
            formData.append('rollNumber', document.getElementById('rollNumber').value);
            formData.append('course', document.getElementById('course').value);
            formData.append('academicYear', document.getElementById('academicYear').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('bloodGroup', document.getElementById('bloodGroup').value);
            formData.append('emergencyContact', document.getElementById('emergencyContact').value);
            formData.append('issueDate', document.getElementById('issueDate').value);

            const photoFile = photoInput.files[0];
            if (photoFile) {
                formData.append('photo', photoFile);
            }

            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('Student added successfully!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Failed to add student. Check console for details.');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>

</html>
