<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal | Aurora University</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Faculty Portal | Aurora University</title>
        <!-- Premium Poppins Font -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
        <style>
            :root {
                --primary: #C8102E;
                --primary-dark: #8b0a1e;
                --secondary: #000080;
                --bg-light: #f8fafc;
                --sidebar-bg: rgba(255, 255, 255, 0.9);
                --text-main: #0f172a;
                --text-dim: #475569;
                --glass-border: rgba(15, 23, 42, 0.08);
                --card-bg: #ffffff;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body {
                background-color: var(--bg-light);
                min-height: 100vh;
                display: flex;
                overflow-x: hidden;
                position: relative;
            }

            /* Light Aurora Mesh Background */
            .mesh-background {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                background:
                    radial-gradient(circle at 100% 0%, rgba(0, 0, 128, 0.03) 0%, transparent 40%),
                    linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            }

            /* Sidebar Navigation */
            aside {
                width: 300px;
                background: var(--sidebar-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-right: 1px solid var(--glass-border);
                z-index: 100;
                display: flex;
                flex-direction: column;
                padding: 3rem 2rem;
                box-shadow: 10px 0 40px rgba(15, 23, 42, 0.02);
            }

            .logo-box {
                display: flex;
                align-items: center;
                gap: 1.25rem;
                margin-bottom: 4rem;
            }

            .logo-icon {
                width: 45px;
                height: auto;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .logo-icon img {
                width: 100%;
                height: auto;
                filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.05));
            }

            .logo-text {
                color: var(--text-main);
                font-size: 1.4rem;
                font-weight: 800;
                letter-spacing: -0.02em;
            }

            .nav-menu {
                flex: 1;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 1.25rem;
                padding: 1.1rem 1.5rem;
                color: var(--text-dim);
                text-decoration: none;
                border-radius: 18px;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                margin-bottom: 0.75rem;
                font-weight: 600;
                font-size: 0.95rem;
            }

            .nav-item:hover {
                color: var(--primary);
                background: rgba(200, 16, 46, 0.05);
                transform: translateX(5px);
            }

            .nav-item.active {
                background: var(--primary);
                color: white;
                box-shadow: 0 10px 20px rgba(200, 16, 46, 0.2);
            }

            .logout-btn {
                margin-top: auto;
                padding: 1.1rem;
                background: #fff;
                color: var(--text-dim);
                text-align: center;
                border-radius: 18px;
                text-decoration: none;
                font-weight: 700;
                transition: all 0.3s;
                border: 1px solid var(--glass-border);
                font-size: 0.9rem;
            }

            .logout-btn:hover {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
                box-shadow: 0 10px 20px rgba(200, 16, 46, 0.15);
            }

            main {
                flex: 1;
                z-index: 10;
                padding: 3rem 5%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .coming-soon-card {
                background: white;
                border: 1px solid var(--glass-border);
                border-radius: 40px;
                padding: 6rem 3rem;
                max-width: 650px;
                box-shadow: 0 30px 60px -20px rgba(15, 23, 42, 0.05);
                animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes cardReveal {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .coming-soon-card h2 {
                color: var(--text-main);
                font-size: 3rem;
                font-weight: 800;
                letter-spacing: -0.03em;
                margin-bottom: 1.5rem;
            }

            .coming-soon-card p {
                color: var(--text-dim);
                font-size: 1.15rem;
                line-height: 1.7;
                margin-bottom: 3rem;
                font-weight: 500;
            }

            .btn-back {
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                color: white;
                padding: 1.2rem 3rem;
                border-radius: 18px;
                text-decoration: none;
                font-weight: 700;
                transition: all 0.4s;
                box-shadow: 0 15px 30px rgba(200, 16, 46, 0.2);
                font-size: 1rem;
            }

            .btn-back:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 40px rgba(200, 16, 46, 0.3);
                filter: brightness(1.1);
            }
        </style>
    </head>

<body onload="checkLogin()">
    <div class="mesh-background"></div>
    <aside>
        <div class="logo-box">
            <div class="logo-icon">
                <img src="images/aurora.png" alt="Aurora Logo">
            </div><span class="logo-text">Aurora</span>
        </div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><span>🏠</span> Dashboard Hub</a>
            <a href="student-dashboard.html" class="nav-item"><span>🎓</span> Student Portal</a>
            <a href="faculty-dashboard.html" class="nav-item active"><span>👔</span> Faculty Portal</a>
        </nav>
        <a href="javascript:void(0)" onclick="logout()" class="logout-btn">Terminate Session</a>
    </aside>

    <main>
        <div class="coming-soon-card">
            <div style="font-size: 4rem; margin-bottom: 2rem;">🏗️</div>
            <h2>Faculty Portal</h2>
            <p>Our engineering team is currently developing the faculty identification management layer. This module
                will support advanced credentialing for academic staff and administration.</p>
            <a href="dashboard.html" class="btn-back">Return to Hub</a>
        </div>
    </main>

    <script>
        function checkLogin() { if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; } }
        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>

</html>
