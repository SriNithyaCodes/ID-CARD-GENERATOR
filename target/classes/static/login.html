<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Aurora University</title>
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Portal | Aurora University</title>
        <!-- Premium Poppins Font -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
        <style>
            :root {
                --primary: #C8102E;
                --primary-dark: #8b0a1e;
                --secondary: #000080;
                --bg-light: #f8fafc;
                --card-bg: rgba(255, 255, 255, 0.9);
                --text-main: #0f172a;
                --text-dim: #475569;
                --input-bg: #fff;
                --border-color: #e2e8f0;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body {
                background-color: var(--bg-light);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                position: relative;
            }

            /* Light Aurora Mesh Background */
            .mesh-background {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                background:
                    radial-gradient(circle at 0% 0%, rgba(200, 16, 46, 0.05) 0%, transparent 40%),
                    radial-gradient(circle at 100% 100%, rgba(0, 0, 128, 0.05) 0%, transparent 40%),
                    linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            }

            /* Animated Blobs (Lighter for light mode) */
            .blob {
                position: absolute;
                width: 600px;
                height: 600px;
                background: linear-gradient(135deg, rgba(200, 16, 46, 0.08), rgba(0, 0, 128, 0.08));
                filter: blur(100px);
                border-radius: 50%;
                opacity: 0.6;
                z-index: 0;
                animation: float 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            }

            @keyframes float {
                0% {
                    transform: translate(0, 0) scale(1);
                }

                100% {
                    transform: translate(50px, 100px) scale(1.1);
                }
            }

            .blob-1 {
                top: -200px;
                left: -200px;
            }

            .blob-2 {
                bottom: -200px;
                right: -200px;
                animation-delay: -5s;
            }

            /* Premium Light Card */
            .login-card {
                position: relative;
                z-index: 10;
                width: 100%;
                max-width: 460px;
                background: var(--card-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 32px;
                padding: 4rem 3rem;
                box-shadow: 0 40px 100px -20px rgba(15, 23, 42, 0.1);
                animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes cardReveal {
                from {
                    opacity: 0;
                    transform: translateY(40px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .header {
                text-align: center;
                margin-bottom: 3.5rem;
            }

            .logo-box {
                width: 80px;
                height: auto;
                margin: 0 auto 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: 0.3s;
            }

            .logo-box img {
                width: 100%;
                height: auto;
                filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
            }

            .login-card:hover .logo-box {
                transform: rotate(0deg) scale(1.05);
            }

            .header h1 {
                color: var(--text-main);
                font-size: 2.2rem;
                font-weight: 800;
                margin-bottom: 0.5rem;
                letter-spacing: -0.02em;
            }

            .header p {
                color: var(--text-dim);
                font-size: 1rem;
                font-weight: 500;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            label {
                display: block;
                color: var(--text-main);
                font-size: 0.85rem;
                font-weight: 700;
                margin-bottom: 0.75rem;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .input-wrapper {
                position: relative;
            }

            input {
                width: 100%;
                background: var(--input-bg);
                border: 2px solid var(--border-color);
                border-radius: 16px;
                padding: 1.1rem 1.25rem;
                color: var(--text-main);
                font-size: 1rem;
                font-weight: 500;
                transition: all 0.3s ease;
                outline: none;
            }

            input:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.1);
                background: #fff;
            }

            input::placeholder {
                color: #94a3b8;
            }

            .login-btn {
                width: 100%;
                padding: 1.2rem;
                background: linear-gradient(135deg, var(--primary), #a00d25);
                color: white;
                border: none;
                border-radius: 16px;
                font-size: 1.1rem;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                margin-top: 1.5rem;
                box-shadow: 0 15px 35px -10px rgba(200, 16, 46, 0.4);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
            }

            .login-btn:hover {
                transform: translateY(-5px);
                box-shadow: 0 25px 50px -15px rgba(200, 16, 46, 0.5);
            }

            .login-btn:active {
                transform: translateY(-2px);
            }

            .footer-note {
                text-align: center;
                margin-top: 2.5rem;
                color: var(--text-dim);
                font-size: 0.85rem;
                font-weight: 500;
            }

            @media (max-width: 480px) {
                .login-card {
                    padding: 3rem 1.5rem;
                    margin: 1rem;
                }
            }
        </style>
    </head>

<body>
    <div class="mesh-background"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        <div class="header">
            <div class="logo-box">
                <img src="images/aurora.png" alt="Aurora Logo">
            </div>
            <h1>Portal Access</h1>
            <p>Administrative Control Center</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Identifier</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter admin username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label>Credentials</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                <span class="btn-text">Establish Secure Session</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>

        <div class="footer-note">
            &copy; 2026 Aurora University. All Rights Reserved.
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.opacity = '0.7';
            btnText.textContent = 'Authenticating...';

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            setTimeout(() => {
                if (u === 'admin' && p === 'admin123') {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('ACCESS DENIED: Invalid administrative credentials.');
                    submitBtn.style.pointerEvents = 'all';
                    submitBtn.style.opacity = '1';
                    btnText.textContent = 'Establish Secure Session';
                }
            }, 800);
        });

        // Interactive mouse movement for blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            document.querySelector('.blob-1').style.transform = `translate(${x * 60}px, ${y * 60}px)`;
            document.querySelector('.blob-2').style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>
</body>

</html>
